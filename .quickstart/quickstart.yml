database_key: recurly_database
schema_key: recurly_schema

dbt_versions: ">=1.3.0 <3.0.0"

table_variables:
  recurly__using_credit_payment_history:
    - credit_payment_history
  recurly__using_subscription_add_on_history:
    - subscription_add_on_history
  recurly__using_subscription_change_history:
    - subscription_change_history

  _fivetran_quickstart_plan_currency_history:
    - plan_currency_history
  _fivetran_quickstart_invoice_subscription_history:
    - invoice_subscription_history
  _fivetran_quickstart_transaction_subscription:
    - transaction_subscription
  _fivetran_quickstart_account_balance_history:
    - account_balance_history
  _fivetran_quickstart_coupon_redemption_history:
    - coupon_redemption_history
  _fivetran_quickstart_coupon_discount:
    - coupon_discount
  _fivetran_quickstart_invoice_coupon_redemption_history:
    - invoice_coupon_redemption_history
  _fivetran_quickstart_billing_info_history:
    - billing_info_history
  _fivetran_quickstart_account_note_history:
    - account_note_history

destination_configurations:
  databricks:
    dispatch:
      - macro_namespace: dbt_utils
        search_order: [ 'spark_utils', 'dbt_utils' ]

public_models: [
  "recurly__account_daily_overview",
  "recurly__account_overview",
  "recurly__balance_transactions",
  "recurly__churn_analysis",
  "recurly__monthly_recurring_revenue",
  "recurly__subscription_overview",
  "recurly__line_item_enhanced"
]

supported_vars:
  recurly_account_pass_through_columns:
    type: dictionary
    description: "Addtional `ACCOUNT_HISTORY` columns to include in `recurly__account_overview`"
    display_name: "Additional Account History Columns"

  recurly_subscription_pass_through_columns:
    type: dictionary
    description: "Addtional `SUBSCRIPTION_HISTORY` columns to include in `recurly__subscription_overview`"
    display_name: "Additional Subscription History Columns"

